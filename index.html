<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasab Pro - Final Secure Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #e67e22; --wa: #25d366; --bg: #f4f7f6; }
        body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* LOGIN */
        #login-page {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            position: fixed; width: 100%; z-index: 5000;
        }

        .tree-container { overflow: auto; padding: 40px 20px; text-align: center; min-height: 90vh; }
        .gen-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }

        /* Garis Pohon */
        .tree ul { padding-top: 20px; position: relative; display: flex; justify-content: center; }
        .tree li { float: left; text-align: center; list-style-type: none; position: relative; padding: 20px 5px 0 5px; }
        .tree li::before, .tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 2px solid #adb5bd; width: 50%; height: 20px; }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid #adb5bd; }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid #adb5bd; border-radius: 0 5px 0 0; }
        .tree li:first-child::after { border-radius: 5px 0 0 0; }
        .tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid #adb5bd; width: 0; height: 20px; }

        /* Kartu Anggota */
        .person-card {
            border: 2px solid #dee2e6; padding: 12px; display: inline-block; border-radius: 12px;
            background-color: white; min-width: 160px; box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            cursor: pointer; transition: 0.2s; user-select: none;
        }
        .person-card:hover { transform: translateY(-5px); border-color: var(--secondary); }
        .person-card .name { font-weight: bold; color: var(--primary); font-size: 0.95rem; }
        .person-card .spouse { font-size: 0.75rem; color: #e74c3c; margin-top: 4px; padding-top: 4px; border-top: 1px dashed #eee; }

        .gen-tag { background: var(--accent); color: white; padding: 1px 8px; border-radius: 8px; font-size: 0.6rem; margin-bottom: 5px; display: inline-block; font-weight: bold; }

        /* Context Menu */
        #custom-menu {
            position: absolute; display: none; z-index: 4000; background: white;
            border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); min-width: 180px; overflow: hidden;
        }
        .menu-header { background: #f8f9fa; padding: 10px 15px; font-size: 0.7rem; font-weight: bold; color: #777; border-bottom: 1px solid #eee; }
        .menu-item { padding: 10px 15px; cursor: pointer; display: flex; align-items: center; font-size: 0.85rem; color: #333; border: none; width: 100%; background: none; text-align: left; }
        .menu-item i { width: 25px; color: var(--primary); }
        .menu-item:hover { background-color: #f1f3f5; }

        .profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .stat-box { padding: 8px; border-radius: 10px; background: #f8f9fa; border: 1px solid #eee; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: var(--primary); display: block; }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }

        #img-preview { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; display: none; margin-bottom: 10px; border: 2px solid var(--secondary); }

        .hidden { display: none !important; }
        .nav-select { background: #34495e; color: white; border: none; border-radius: 5px; font-size: 0.75rem; padding: 5px; outline: none; }
        .sync-status { font-size: 0.65rem; color: #2ecc71; margin-left: 5px; }
    </style>
</head>
<body>

<!-- HALAMAN LOGIN -->
<div id="login-page">
    <div class="card p-4 shadow-lg border-0" style="width: 340px; border-radius: 20px;">
        <div class="text-center mb-4">
            <div class="bg-primary text-white d-inline-block p-3 rounded-circle mb-2"><i class="fas fa-sitemap fa-2x"></i></div>
            <h4 class="fw-bold">Nasab Pro Cloud</h4>
            <p class="text-muted small">Login Akses Sistem</p>
        </div>
        <div class="mb-3"><label class="small fw-bold">Username</label><input type="text" id="username" class="form-control" value="boss"></div>
        <div class="mb-3"><label class="small fw-bold">Password</label><input type="password" id="password" class="form-control" value="boss123"></div>
        <button class="btn btn-primary w-100 py-2 fw-bold" onclick="login()">MASUK</button>
    </div>
</div>

<!-- APLIKASI UTAMA -->
<div id="main-app" class="hidden">
    <nav class="navbar navbar-dark bg-dark sticky-top px-3 shadow">
        <span class="navbar-brand mb-0 h1" style="font-size: 1rem;">
            <i class="fas fa-leaf text-success me-1"></i>NasabPro <span id="cloud-info" class="sync-status"></span>
        </span>
        <div class="d-flex align-items-center">
            <select id="gen-filter" class="nav-select me-2" onchange="resetFocusAndRender()">
                <option value="all">Semua Gen</option>
                <option value="1">Gen 1</option><option value="2">Gen 2</option><option value="3">Gen 3</option><option value="4">Gen 4</option>
            </select>
            <button class="btn btn-outline-success btn-sm me-1" onclick="syncWithCloud()"><i class="fas fa-sync"></i></button>
            <button class="btn btn-outline-secondary btn-sm me-1" onclick="openGhSettings()"><i class="fas fa-cog"></i></button>
            <button id="btn-manage-accounts" class="btn btn-warning btn-sm me-1 hidden" onclick="openUserManagement()"><i class="fas fa-users-cog"></i> Akun</button>
            <span id="role-badge" class="badge bg-primary me-2"></span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="fas fa-power-off"></i></button>
        </div>
    </nav>
    <div class="tree-container"><div id="tree-root" class="tree"></div></div>
</div>

<!-- CONTEXT MENU -->
<div id="custom-menu">
    <div class="menu-header">MENU: <span id="menu-role-name"></span></div>
    <div id="group-staff" class="hidden">
        <button class="menu-item" onclick="handleMenuAction('child')"><i class="fas fa-child"></i> Tambah Anak</button>
        <button class="menu-item" onclick="handleMenuAction('spouse')"><i class="fas fa-ring"></i> Tambah Pasangan</button>
        <button class="menu-item" onclick="handleMenuAction('edit')"><i class="fas fa-edit"></i> Edit Data</button>
    </div>
    <div id="group-admin-only" class="hidden">
        <button class="menu-item text-danger" onclick="handleMenuAction('delete')"><i class="fas fa-trash"></i> Hapus Anggota</button>
    </div>
    <hr class="my-1">
    <button class="menu-item" onclick="showDetailFromMenu()"><i class="fas fa-info-circle"></i> Lihat Detail</button>
</div>

<!-- MODAL MANAJEMEN USER -->
<div class="modal fade" id="userManagementModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-warning border-0">
                <h6 class="fw-bold mb-0">Kelola Akun Login</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <button class="btn btn-primary btn-sm mb-3" onclick="openUserForm('add')">Buat Akun Baru</button>
                <table class="table table-sm table-hover align-middle">
                    <thead><tr><th>Username</th><th>Password</th><th>Role</th><th>Aksi</th></tr></thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- MODAL FORM AKUN (ADD/EDIT) -->
<div class="modal fade" id="userFormModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0"><h6 class="fw-bold mb-0">Form Akun</h6></div>
            <div class="modal-body">
                <input type="hidden" id="reg-old-id">
                <input type="text" id="reg-username" class="form-control form-control-sm mb-2" placeholder="Username">
                <input type="text" id="reg-password" class="form-control form-control-sm mb-2" placeholder="Password">
                <select id="reg-role" class="form-select form-select-sm mb-3">
                    <option value="administrator">Administrator (Penuh)</option>
                    <option value="admin">Admin (Tambah/Edit)</option>
                    <option value="viewer">User (Lihat Saja)</option>
                </select>
                <button class="btn btn-primary w-100 btn-sm fw-bold" onclick="saveAccount()">SIMPAN AKUN</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL GITHUB SETTINGS -->
<div class="modal fade" id="ghSettingsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white border-0"><h6 class="modal-title">GitHub Config</h6></div>
            <div class="modal-body">
                <input type="password" id="gh-token" class="form-control form-control-sm mb-2" placeholder="Token GitHub">
                <input type="text" id="gh-owner" class="form-control form-control-sm mb-2" placeholder="Username">
                <input type="text" id="gh-repo" class="form-control form-control-sm mb-2" placeholder="Repository">
                <button class="btn btn-primary w-100 btn-sm fw-bold" onclick="saveGhConfig()">SIMPAN</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL DETAIL -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-body text-center p-4">
                <button type="button" class="btn-close float-end" data-bs-dismiss="modal"></button>
                <img id="detImg" src="" class="profile-img mt-2">
                <h4 id="detName" class="fw-bold mb-0"></h4>
                <p id="detSpouse" class="text-danger small fw-bold mb-3"></p>
                <div class="row g-2 mb-3">
                    <div class="col-4"><div class="stat-box"><span class="stat-label">Gen</span><span id="detGen" class="stat-value"></span></div></div>
                    <div class="col-4"><div class="stat-box"><span class="stat-label">Anak</span><span id="detChildren" class="stat-value"></span></div></div>
                    <div class="col-4"><div class="stat-box"><span class="stat-label">Silsilah</span><button class="btn btn-link btn-sm p-0 d-block w-100 fw-bold" onclick="setFocusTree()">FOKUS</button></div></div>
                </div>
                <div class="text-start bg-light p-3 rounded small" id="detBio"></div>
                <div id="contact-area"></div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL FORM DATA NASAB -->
<div class="modal fade" id="nodeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0"><h6 class="fw-bold mb-0">Data Nasab</h6></div>
            <div class="modal-body">
                <div class="text-center mb-3" id="photo-field">
                    <img id="img-preview" src=""><input type="file" id="inputPhoto" class="form-control form-control-sm" accept="image/*" onchange="previewFile()">
                </div>
                <input type="text" id="inputName" class="form-control form-control-sm mb-2" placeholder="Nama Lengkap">
                <div id="extended-fields">
                    <input type="number" id="inputPhone" class="form-control form-control-sm mb-2" placeholder="WA (62...)">
                    <textarea id="inputBio" class="form-control form-control-sm mb-2" rows="2" placeholder="Biografi"></textarea>
                </div>
                <button class="btn btn-primary w-100 fw-bold btn-sm" onclick="saveData()">SIMPAN</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // --- STORAGE ---
    let ghConfig = JSON.parse(localStorage.getItem('ghConfig')) || { token: '', owner: '', repo: '', path: 'data.json' };
    let familyData = JSON.parse(localStorage.getItem('nasabData')) || [{ id: "root", name: "Kepala Keluarga", parentId: null, spouse: "", bio: "Pangkal.", phone: "", photo: "" }];
    let systemUsers = JSON.parse(localStorage.getItem('nasabUsers')) || [
        { username: 'boss', pass: 'boss123', role: 'administrator' },
        { username: 'admin', pass: 'admin123', role: 'admin' },
        { username: 'user', pass: 'user123', role: 'viewer' }
    ];

    let currentUser = null, selectedNodeId = null, currentAction = "", currentBase64 = "", focusNodeId = null;

    // --- MANAJEMEN AKUN (FIXED) ---
    function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const user = systemUsers.find(x => x.username === u && x.pass === p);
        if (user) { currentUser = user; startApp(); } else { alert('Gagal!'); }
    }

    function startApp() {
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('role-badge').innerText = currentUser.role.toUpperCase();
        if(currentUser.role === 'administrator') document.getElementById('btn-manage-accounts').classList.remove('hidden');
        renderTree(); syncWithCloud();
    }

    function openUserManagement() {
        renderUserTable();
        new bootstrap.Modal(document.getElementById('userManagementModal')).show();
    }

    function renderUserTable() {
        const tbody = document.getElementById('user-table-body');
        tbody.innerHTML = systemUsers.map(u => `
            <tr>
                <td><b>${u.username}</b></td>
                <td><code>${u.pass}</code></td>
                <td>${u.role}</td>
                <td>
                    <button class="btn btn-sm btn-info text-white" onclick="openUserForm('edit', '${u.username}')"><i class="fas fa-edit"></i></button>
                    ${u.username !== 'boss' ? `<button class="btn btn-sm btn-danger" onclick="deleteAccount('${u.username}')"><i class="fas fa-trash"></i></button>` : ''}
                </td>
            </tr>
        `).join('');
    }

    function openUserForm(mode, username = '') {
        currentAction = mode;
        if(mode === 'edit') {
            const u = systemUsers.find(x => x.username === username);
            document.getElementById('reg-old-id').value = u.username;
            document.getElementById('reg-username').value = u.username;
            document.getElementById('reg-password').value = u.pass;
            document.getElementById('reg-role').value = u.role;
        } else {
            document.getElementById('reg-old-id').value = "";
            document.getElementById('reg-username').value = "";
            document.getElementById('reg-password').value = "";
            document.getElementById('reg-role').value = "viewer";
        }
        new bootstrap.Modal(document.getElementById('userFormModal')).show();
    }

    function saveAccount() {
        const name = document.getElementById('reg-username').value;
        const pass = document.getElementById('reg-password').value;
        const role = document.getElementById('reg-role').value;
        const oldId = document.getElementById('reg-old-id').value;

        if(!name || !pass) return alert('Wajib isi semua!');

        if(currentAction === 'edit') {
            const idx = systemUsers.findIndex(x => x.username === oldId);
            systemUsers[idx] = { username: name, pass: pass, role: role };
        } else {
            if(systemUsers.find(x => x.username === name)) return alert('Username sudah ada!');
            systemUsers.push({ username: name, pass: pass, role: role });
        }
        
        localStorage.setItem('nasabUsers', JSON.stringify(systemUsers));
        renderUserTable();
        bootstrap.Modal.getInstance(document.getElementById('userFormModal')).hide();
    }

    function deleteAccount(un) {
        if(confirm('Hapus akun?')) {
            systemUsers = systemUsers.filter(x => x.username !== un);
            localStorage.setItem('nasabUsers', JSON.stringify(systemUsers));
            renderUserTable();
        }
    }

    // --- POHON & CLOUD LOGIC ---
    async function syncWithCloud() {
        if (!ghConfig.token) return;
        document.getElementById('cloud-info').innerText = "Sync...";
        try {
            const url = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${ghConfig.path}`;
            const res = await fetch(url, { headers: { 'Authorization': `token ${ghConfig.token}` } });
            if (res.ok) {
                const d = await res.json();
                familyData = JSON.parse(decodeURIComponent(escape(atob(d.content))));
                localStorage.setItem('nasabData', JSON.stringify(familyData));
                renderTree();
                document.getElementById('cloud-info').innerText = "Cloud OK";
            }
        } catch (e) { document.getElementById('cloud-info').innerText = "Offline"; }
    }

    async function pushToCloud() {
        if (!ghConfig.token) return;
        const url = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${ghConfig.path}`;
        let sha = "";
        try {
            const res = await fetch(url, { headers: { 'Authorization': `token ${ghConfig.token}` } });
            if(res.ok) { const d = await res.json(); sha = d.sha; }
        } catch (e) {}
        const body = { message: "Sync Nasab", content: btoa(unescape(encodeURIComponent(JSON.stringify(familyData, null, 2)))), sha: sha };
        await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${ghConfig.token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    }

    function renderTree() {
        const container = document.getElementById('tree-root');
        const filterVal = document.getElementById('gen-filter').value;
        if (focusNodeId) {
            container.className = "tree";
            const focusRoot = familyData.find(p => p.id === focusNodeId);
            container.innerHTML = `<ul>${buildTreeHtml(focusRoot)}</ul>`;
        } else if (filterVal === 'all') {
            container.className = "tree";
            const root = familyData.find(p => !p.parentId);
            container.innerHTML = `<ul>${buildTreeHtml(root)}</ul>`;
        } else {
            container.className = "gen-grid";
            const members = familyData.filter(p => getGeneration(p.id) === parseInt(filterVal));
            container.innerHTML = members.map(p => `<div class="person-card shadow-sm" onclick="showDetail('${p.id}')"><div class="name">${p.name}</div></div>`).join('');
        }
    }

    function buildTreeHtml(person) {
        if (!person) return "";
        const children = familyData.filter(c => c.parentId === person.id);
        const gen = getGeneration(person.id);
        return `<li>
            <div class="person-card shadow-sm" onclick="showDetail('${person.id}')" data-id="${person.id}">
                <span class="gen-tag">Gen ${gen}</span>
                <div class="name">${person.name}</div>
                ${person.spouse ? `<div class="spouse"><i class="fas fa-heart"></i> ${person.spouse}</div>` : ''}
            </div>
            ${children.length > 0 ? `<ul>${children.map(c => buildTreeHtml(c)).join('')}</ul>` : ''}
        </li>`;
    }

    function getGeneration(id) {
        let level = 1; let curr = familyData.find(p => p.id === id);
        while (curr && curr.parentId) { level++; curr = familyData.find(p => p.id === curr.parentId); }
        return level;
    }

    function showDetail(id) {
        const p = familyData.find(x => x.id === id);
        selectedNodeId = id;
        document.getElementById('detName').innerText = p.name;
        document.getElementById('detSpouse').innerText = p.spouse ? "Pasangan: " + p.spouse : "";
        document.getElementById('detGen').innerText = getGeneration(id);
        document.getElementById('detChildren').innerText = familyData.filter(x => x.parentId === id).length;
        document.getElementById('detImg').src = p.photo || "https://via.placeholder.com/100?text=No+Photo";
        document.getElementById('detBio').innerText = p.bio || "-";
        
        const contactArea = document.getElementById('contact-area');
        if (p.phone) {
            let wa = p.phone.toString(); if(wa.startsWith('0')) wa = '62' + wa.slice(1);
            contactArea.innerHTML = `<a href="https://wa.me/${wa}" target="_blank" class="btn btn-success btn-sm w-100 mt-3 fw-bold">HUBUNGI WA</a>`;
        } else { contactArea.innerHTML = ""; }

        new bootstrap.Modal(document.getElementById('detailModal')).show();
    }

    // --- CONTEXT MENU ---
    const menu = document.getElementById('custom-menu');
    window.addEventListener('contextmenu', e => {
        const card = e.target.closest('.person-card');
        if (card && currentUser) { 
            e.preventDefault(); 
            selectedNodeId = card.getAttribute('data-id');
            const role = currentUser.role;
            document.getElementById('menu-role-name').innerText = role.toUpperCase();
            
            if(role === 'administrator') {
                document.getElementById('group-staff').classList.remove('hidden');
                document.getElementById('group-admin-only').classList.remove('hidden');
            } else if (role === 'admin') {
                document.getElementById('group-staff').classList.remove('hidden');
                document.getElementById('group-admin-only').classList.add('hidden');
            } else {
                document.getElementById('group-staff').classList.add('hidden');
                document.getElementById('group-admin-only').classList.add('hidden');
            }
            menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px'; 
        } else { menu.style.display = 'none'; }
    });
    window.addEventListener('click', () => menu.style.display = 'none');

    // --- NASAB CRUD ---
    function handleMenuAction(type) {
        currentAction = type;
        const p = familyData.find(x => x.id === selectedNodeId);
        if (type === 'delete') {
            if(confirm('Hapus data?')) { familyData = familyData.filter(x => x.id !== selectedNodeId && x.parentId !== selectedNodeId); saveNasab(); }
            return;
        }
        document.getElementById('photo-field').classList.toggle('hidden', type === 'spouse');
        document.getElementById('extended-fields').classList.toggle('hidden', type === 'spouse');
        if (type === 'edit') {
            document.getElementById('inputName').value = p.name;
            document.getElementById('inputPhone').value = p.phone || "";
            document.getElementById('inputBio').value = p.bio || "";
            currentBase64 = p.photo || "";
        } else {
            document.getElementById('inputName').value = ""; document.getElementById('inputPhone').value = "";
            document.getElementById('inputBio').value = ""; currentBase64 = "";
        }
        new bootstrap.Modal(document.getElementById('nodeModal')).show();
    }

    function saveData() {
        const n = document.getElementById('inputName').value;
        const ph = document.getElementById('inputPhone').value;
        const bi = document.getElementById('inputBio').value;
        if (currentAction === 'edit') {
            const idx = familyData.findIndex(x => x.id === selectedNodeId);
            familyData[idx].name = n; familyData[idx].phone = ph; familyData[idx].bio = bi; familyData[idx].photo = currentBase64;
        } else if (currentAction === 'child') {
            familyData.push({ id: Date.now().toString(), name: n, parentId: selectedNodeId, spouse: "", bio: bi, phone: ph, photo: currentBase64 });
        } else if (currentAction === 'spouse') familyData.find(x => x.id === selectedNodeId).spouse = n;
        saveNasab();
        bootstrap.Modal.getInstance(document.getElementById('nodeModal')).hide();
    }

    function saveNasab() { localStorage.setItem('nasabData', JSON.stringify(familyData)); renderTree(); pushToCloud(); }
    function previewFile() {
        const file = document.getElementById('inputPhoto').files[0];
        const reader = new FileReader();
        reader.onloadend = () => { currentBase64 = reader.result; document.getElementById('img-preview').src = reader.result; document.getElementById('img-preview').style.display = "inline-block"; }
        if (file) reader.readAsDataURL(file);
    }
    function saveGhConfig() {
        ghConfig.token = document.getElementById('gh-token').value;
        ghConfig.owner = document.getElementById('gh-owner').value;
        ghConfig.repo = document.getElementById('gh-repo').value;
        localStorage.setItem('ghConfig', JSON.stringify(ghConfig));
        bootstrap.Modal.getInstance(document.getElementById('ghSettingsModal')).hide();
        syncWithCloud();
    }
    function openGhSettings() {
        document.getElementById('gh-token').value = ghConfig.token;
        document.getElementById('gh-owner').value = ghConfig.owner;
        document.getElementById('gh-repo').value = ghConfig.repo;
        new bootstrap.Modal(document.getElementById('ghSettingsModal')).show();
    }
    function setFocusTree() { focusNodeId = selectedNodeId; bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide(); renderTree(); }
    function resetFocusAndRender() { focusNodeId = null; renderTree(); }
    function showDetailFromMenu() { showDetail(selectedNodeId); }
    function logout() { location.reload(); }
</script>
</body>
</html>
