<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silsilah Keluarga - Nasab Digital</title>
    
    <!-- Library CSS & JS -->
    <script src="https://balkangraph.com/js/orgchart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary-blue: #1e40af; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f1f5f9; }
        #tree { width: 100%; height: calc(100vh - 64px); }
        
        /* Custom UI Responsif */
        .node-menu {
            display: none; position: absolute; background: white; 
            border-radius: 8px; shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            z-index: 1000; width: 200px; border: 1px solid #e2e8f0;
        }
        .menu-item {
            padding: 12px 16px; cursor: pointer; display: flex; align-items: center;
            gap: 10px; color: #334155; transition: 0.2s;
        }
        .menu-item:hover { background: #eff6ff; color: #1e40af; }
        .menu-item.danger { color: #ef4444; }
        .menu-item.danger:hover { background: #fef2f2; }
    </style>
</head>
<body>

    <!-- Header -->
    <nav class="bg-blue-800 h-16 flex items-center justify-between px-6 text-white shadow-lg">
        <div class="flex items-center gap-2">
            <i class="fas fa-sitemap text-xl text-blue-300"></i>
            <h1 class="font-bold text-lg tracking-tight">NasabKeluarga</h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p id="displayUser" class="text-xs font-bold">Tamu (Viewer)</p>
                <p id="displayRole" class="text-[10px] text-blue-200 uppercase">Read Only</p>
            </div>
            <button onclick="toggleLoginModal()" class="bg-blue-600 p-2 rounded-full hover:bg-blue-500 transition">
                <i class="fas fa-user-lock"></i>
            </button>
        </div>
    </nav>

    <!-- Map Container -->
    <div id="tree"></div>

    <!-- Context Menu (Garis 3) -->
    <div id="nodeContextMenu" class="node-menu shadow-xl">
        <div class="menu-item font-bold border-b text-blue-800" id="menuName">Nama Anggota</div>
        <div class="menu-item" onclick="handleMenu('edit')"><i class="fas fa-edit w-5"></i> Edit Profil</div>
        <div class="menu-item admin-only" onclick="handleMenu('add_up')"><i class="fas fa-arrow-up w-5"></i> Tambah Orang Tua</div>
        <div class="menu-item" onclick="handleMenu('add_spouse')"><i class="fas fa-heart w-5"></i> Tambah Suami/Istri</div>
        <div class="menu-item" onclick="handleMenu('add_child')"><i class="fas fa-child w-5"></i> Tambah Anak</div>
        <div class="menu-item border-t" onclick="handleMenu('bio')"><i class="fas fa-file-alt w-5"></i> Biografi</div>
        <div class="menu-item danger border-t admin-only" id="delBtn" onclick="handleMenu('delete')"><i class="fas fa-trash w-5"></i> Hapus</div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 bg-black/60 hidden z-[2000] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-bold mb-4 text-center">Login Sistem</h2>
            <button onclick="doLogin('admin')" class="w-full bg-blue-700 text-white py-3 rounded-xl mb-3 font-bold flex items-center justify-center gap-2">
                <i class="fas fa-user-shield"></i> Login sebagai Admin
            </button>
            <button onclick="doLogin('user')" class="w-full bg-blue-100 text-blue-800 py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                <i class="fas fa-user"></i> Login sebagai User
            </button>
            <p class="text-[10px] text-gray-400 mt-4 text-center text-italic">*Admin bisa tambah ke atas & hapus. User hanya bisa tambah ke bawah.</p>
            <button onclick="toggleLoginModal()" class="w-full mt-4 text-gray-500 text-sm">Batal</button>
        </div>
    </div>

    <!-- Form Modal -->
    <div id="formModal" class="fixed inset-0 bg-black/60 hidden z-[3000] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl">
            <div id="formHeader" class="bg-blue-800 p-4 text-white font-bold">Edit Data</div>
            <div class="p-6">
                <input type="text" id="inpName" placeholder="Nama Lengkap" class="w-full border rounded-lg p-3 mb-4 outline-none focus:ring-2 focus:ring-blue-500">
                <textarea id="inpBio" placeholder="Biografi singkat..." rows="4" class="w-full border rounded-lg p-3 mb-4 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                <div class="flex gap-2">
                    <button onclick="closeForm()" class="flex-1 py-3 text-gray-500 font-bold">Batal</button>
                    <button onclick="submitForm()" class="flex-1 py-3 bg-blue-700 text-white rounded-xl font-bold">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chart;
        let selectedNodeId = null;
        let userRole = 'viewer'; // 'admin', 'user', 'viewer'
        
        // Data awal jika localStorage kosong
        let familyData = [
            { id: 1, name: "Leluhur Pertama", bio: "Kakek Buyut" },
            { id: 2, pid: 1, name: "Anak Pertama", bio: "" }
        ];

        // 1. Inisialisasi Pohon
        function init() {
            const savedData = localStorage.getItem('myNasabData');
            if (savedData) familyData = JSON.parse(savedData);

            chart = new OrgChart(document.getElementById("tree"), {
                template: "ana",
                mouseScrol: OrgChart.action.zoom,
                nodeBinding: {
                    field_0: "name",
                    field_1: "bio"
                },
                // Klik untuk Android (munculkan menu kustom)
                onNodeClick: function(args) {
                    showMenu(args.node.id, args.event);
                    return false;
                }
            });

            chart.load(familyData);
        }

        // 2. Sistem Login & Hak Akses
        function toggleLoginModal() {
            document.getElementById('loginModal').classList.toggle('hidden');
        }

        function doLogin(role) {
            userRole = role;
            document.getElementById('displayUser').innerText = role === 'admin' ? 'Administrator' : 'Anggota Keluarga';
            document.getElementById('displayRole').innerText = role === 'admin' ? 'Akses Penuh' : 'Akses Terbatas';
            
            // Atur visibilitas menu berdasarkan role
            const adminMenus = document.querySelectorAll('.admin-only');
            adminMenus.forEach(m => m.style.display = (role === 'admin' ? 'flex' : 'none'));
            
            toggleLoginModal();
            alert("Berhasil login sebagai " + role);
        }

        // 3. Menu Kontrol
        function showMenu(id, event) {
            selectedNodeId = id;
            const nodeData = chart.get(id);
            const menu = document.getElementById('nodeContextMenu');
            document.getElementById('menuName').innerText = nodeData.name;
            
            // Cek jika user login atau viewer
            if(userRole === 'viewer') {
                alert("Silahkan login untuk mengedit data.");
                return;
            }

            menu.style.display = 'block';
            // Posisi responsif
            let x = event.pageX > window.innerWidth - 200 ? event.pageX - 200 : event.pageX;
            let y = event.pageY > window.innerHeight - 300 ? event.pageY - 250 : event.pageY;
            
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
        }

        window.onclick = function(e) {
            if(!e.target.closest('#nodeContextMenu')) {
                document.getElementById('nodeContextMenu').style.display = 'none';
            }
        }

        // 4. Operasi CRUD
        let currentMode = '';
        function handleMenu(mode) {
            currentMode = mode;
            const nodeData = chart.get(selectedNodeId);
            document.getElementById('nodeContextMenu').style.display = 'none';

            if (mode === 'delete') {
                if(confirm("Hapus " + nodeData.name + " dan semua keturunannya?")) {
                    chart.removeNode(selectedNodeId);
                    saveData();
                }
                return;
            }

            if (mode === 'bio' || mode === 'edit') {
                document.getElementById('formHeader').innerText = "Edit " + nodeData.name;
                document.getElementById('inpName').value = nodeData.name;
                document.getElementById('inpBio').value = nodeData.bio || "";
            } else {
                document.getElementById('formHeader').innerText = "Tambah Anggota Baru";
                document.getElementById('inpName').value = "";
                document.getElementById('inpBio').value = "";
            }
            
            document.getElementById('formModal').classList.remove('hidden');
        }

        function closeForm() {
            document.getElementById('formModal').classList.add('hidden');
        }

        function submitForm() {
            const name = document.getElementById('inpName').value;
            const bio = document.getElementById('inpBio').value;
            const newId = Date.now();

            if (currentMode === 'edit' || currentMode === 'bio') {
                chart.updateNode({ id: selectedNodeId, name, bio });
            } 
            else if (currentMode === 'add_child') {
                chart.addNode({ id: newId, pid: selectedNodeId, name, bio });
            } 
            else if (currentMode === 'add_spouse') {
                chart.addNode({ id: newId, stpid: selectedNodeId, name, bio, tags: ["partner"] });
            } 
            else if (currentMode === 'add_up') {
                // Logika tambah orang tua: geser parent lama ke orang tua baru
                const current = chart.get(selectedNodeId);
                const oldPid = current.pid;
                chart.addNode({ id: newId, pid: oldPid, name, bio });
                chart.updateNode({ id: selectedNodeId, pid: newId });
            }

            saveData();
            closeForm();
        }

        // 5. Simpan Data
        function saveData() {
            const nodes = chart.getNodes();
            localStorage.setItem('myNasabData', JSON.stringify(nodes));
            console.log("Data tersimpan otomatis!");
        }

        window.onload = init;
    </script>
</body>
</html>
