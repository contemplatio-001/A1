<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pohon Nasab Digital</title>
    
    <!-- Library CSS & JS -->
    <script src="https://balkangraph.com/js/orgchart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f0f7ff; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Area Pohon */
        #tree { width: 100%; height: calc(100vh - 64px); }

        /* Menu Garis 3 (Context Menu) */
        .custom-menu {
            display: none; position: absolute; background: white; 
            border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 1000; width: 220px; border: 1px solid #dbeafe; overflow: hidden;
        }
        .menu-item {
            padding: 12px 16px; cursor: pointer; display: flex; align-items: center;
            gap: 12px; color: #1e3a8a; font-size: 14px; transition: 0.2s;
        }
        .menu-item:hover { background: #eff6ff; color: #2563eb; }
        .menu-item.delete { color: #dc2626; border-top: 1px solid #f1f5f9; }
        .menu-item.delete:hover { background: #fef2f2; }

        /* Style Node Box */
        [data-n-id] rect { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; ry: 8; }
        [data-n-id] text { fill: #1e3a8a; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

    <!-- Navigasi Utama -->
    <nav class="bg-blue-700 h-16 flex items-center justify-between px-6 text-white shadow-md relative z-50">
        <div class="flex items-center gap-3">
            <i class="fas fa-sitemap text-2xl"></i>
            <h1 class="font-bold text-lg tracking-wide">Silsilah Keluarga</h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden md:block text-right">
                <p id="roleLabel" class="text-xs font-bold opacity-90">Mode: Tamu (Lihat)</p>
            </div>
            <button onclick="openLogin()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm font-semibold transition">
                <i class="fas fa-user-lock mr-2"></i>Login
            </button>
        </div>
    </nav>

    <!-- Container Utama Pohon -->
    <div id="tree"></div>

    <!-- Menu Garis 3 (Muncul saat klik node) -->
    <div id="nodeMenu" class="custom-menu">
        <div class="bg-blue-50 px-4 py-2 text-[10px] font-bold text-blue-400 uppercase tracking-widest border-b">Menu Anggota</div>
        <div class="menu-item" onclick="action('edit')"><i class="fas fa-user-edit"></i> Edit Profil</div>
        <div id="btnUp" class="menu-item hidden" onclick="action('add_up')"><i class="fas fa-arrow-up"></i> Tambah Orang Tua</div>
        <div class="menu-item" onclick="action('add_spouse')"><i class="fas fa-heart"></i> Tambah Suami / Istri</div>
        <div class="menu-item" onclick="action('add_child')"><i class="fas fa-child"></i> Tambah Anak</div>
        <div class="menu-item" onclick="action('bio')"><i class="fas fa-info-circle"></i> Biografi Singkat</div>
        <div id="btnDel" class="menu-item delete hidden" onclick="action('delete')"><i class="fas fa-trash-alt"></i> Hapus Anggota</div>
    </div>

    <!-- Modal Form (Input Data) -->
    <div id="formModal" class="fixed inset-0 bg-blue-900/60 hidden z-[2000] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-shrink">
            <div class="bg-blue-700 p-5 text-white flex justify-between items-center">
                <h3 id="formTitle" class="font-bold text-lg">Input Data Nasab</h3>
                <button onclick="closeForm()"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Nama Lengkap</label>
                <input type="text" id="inpName" class="w-full border-2 border-gray-100 rounded-xl p-3 mb-4 focus:border-blue-500 outline-none transition">
                
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Biografi / Keterangan</label>
                <textarea id="inpBio" rows="3" class="w-full border-2 border-gray-100 rounded-xl p-3 mb-6 focus:border-blue-500 outline-none transition"></textarea>
                
                <div class="flex gap-3">
                    <button onclick="closeForm()" class="flex-1 py-3 text-gray-500 font-bold hover:bg-gray-50 rounded-xl">Batal</button>
                    <button onclick="saveNode()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 bg-blue-900/80 hidden z-[3000] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-shield-alt text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Login Akses</h2>
            <p class="text-gray-400 text-sm mb-8">Pilih role untuk mengelola pohon nasab</p>
            
            <button onclick="setRole('admin')" class="w-full py-4 bg-blue-700 text-white rounded-2xl mb-4 font-bold shadow-lg">Administrator (Penuh)</button>
            <button onclick="setRole('user')" class="w-full py-4 bg-blue-50 text-blue-700 rounded-2xl font-bold">User (Terbatas)</button>
            
            <button onclick="closeLogin()" class="mt-6 text-gray-400 text-sm underline">Kembali sebagai Viewer</button>
        </div>
    </div>

    <script>
        let chart;
        let selectedId = null;
        let currentRole = 'viewer'; 
        let currentAction = '';

        // Data Awal
        let familyData = [
            { id: "1", name: "Leluhur Utama", bio: "Generasi Pertama" }
        ];

        // 1. Inisialisasi Aplikasi
        window.onload = function() {
            const saved = localStorage.getItem('nasab_data');
            if(saved) familyData = JSON.parse(saved);

            chart = new OrgChart(document.getElementById("tree"), {
                template: "ana",
                mouseScrol: OrgChart.action.zoom,
                nodeBinding: { field_0: "name", field_1: "bio" },
                // Klik Kiri langsung buka menu di Android
                onNodeClick: function(args) {
                    showCustomMenu(args.node.id, args.event);
                    return false; 
                }
            });
            chart.load(familyData);
        };

        // 2. Fungsi Menu & Role
        function openLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
        function closeLogin() { document.getElementById('loginModal').classList.add('hidden'); }

        function setRole(role) {
            currentRole = role;
            document.getElementById('roleLabel').innerText = "Mode: " + (role === 'admin' ? 'Administrator' : 'User (Editor)');
            
            // Tampilkan/Sembunyikan menu berdasarkan hak akses
            document.getElementById('btnDel').style.display = (role === 'admin' ? 'flex' : 'none');
            document.getElementById('btnUp').style.display = (role === 'admin' ? 'flex' : 'none');
            
            closeLogin();
            alert("Login sebagai " + role.toUpperCase());
        }

        function showCustomMenu(id, event) {
            if(currentRole === 'viewer') {
                alert("Silahkan login untuk menambah atau mengedit data.");
                return;
            }
            selectedId = id;
            const menu = document.getElementById('nodeMenu');
            menu.style.display = 'block';
            
            // Posisi menu agar tidak keluar layar
            let x = event.pageX > window.innerWidth - 220 ? event.pageX - 220 : event.pageX;
            let y = event.pageY > window.innerHeight - 300 ? event.pageY - 250 : event.pageY;
            
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
        }

        // Klik di luar menu untuk menutup
        window.onclick = function(e) {
            if(!e.target.closest('.custom-menu')) {
                document.getElementById('nodeMenu').style.display = 'none';
            }
        };

        // 3. Logika CRUD
        function action(type) {
            currentAction = type;
            const nodeData = chart.get(selectedId);
            document.getElementById('nodeMenu').style.display = 'none';

            if(type === 'delete') {
                if(confirm("Hapus " + nodeData.name + "?")) {
                    chart.removeNode(selectedId);
                    saveToStorage();
                }
                return;
            }

            // Siapkan Modal
            document.getElementById('inpName').value = (type === 'edit' || type === 'bio') ? nodeData.name : "";
            document.getElementById('inpBio').value = (type === 'edit' || type === 'bio') ? (nodeData.bio || "") : "";
            document.getElementById('formTitle').innerText = (type === 'edit' ? "Edit Profil" : "Tambah Anggota");
            document.getElementById('formModal').classList.remove('hidden');
        }

        function closeForm() { document.getElementById('formModal').classList.add('hidden'); }

        function saveNode() {
            const name = document.getElementById('inpName').value;
            const bio = document.getElementById('inpBio').value;
            const newId = Date.now().toString();

            if(!name) return alert("Nama tidak boleh kosong");

            if(currentAction === 'edit' || currentAction === 'bio') {
                chart.updateNode({ id: selectedId, name: name, bio: bio });
            } 
            else if(currentAction === 'add_child') {
                chart.addNode({ id: newId, pid: selectedId, name: name, bio: bio });
            }
            else if(currentAction === 'add_spouse') {
                chart.addNode({ id: newId, stpid: selectedId, name: name, bio: bio, tags: ["partner"] });
            }
            else if(currentAction === 'add_up') {
                // Admin: Menambah generasi ke atas
                const current = chart.get(selectedId);
                const oldPid = current.pid;
                chart.addNode({ id: newId, pid: oldPid, name: name, bio: bio });
                chart.updateNode({ id: selectedId, pid: newId });
            }

            saveToStorage();
            closeForm();
        }

        // 4. Sinkronisasi Data
        function saveToStorage() {
            const nodes = chart.getNodes();
            localStorage.setItem('nasab_data', JSON.stringify(nodes));
            console.log("Data otomatis tersimpan.");
        }
    </script>
</body>
</html>
