<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>Nasab Pro - Blue AutoCloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1a5276; --secondary: #2980b9; --accent: #d4e6f1; --wa: #25d366; --bg: #f4f7fb; }
        body { background-color: var(--bg); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow: hidden; height: 100vh; width: 100vw; color: #333; }
        #login-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary), var(--secondary)); position: fixed; width: 100%; z-index: 5000; }
        .navbar { background-color: var(--primary) !important; z-index: 1050; border-bottom: 3px solid var(--secondary); }
        .offcanvas { background-color: var(--primary); color: white; width: 280px !important; }
        .nav-link-custom { color: white; padding: 12px 20px; display: flex; align-items: center; text-decoration: none; border-radius: 8px; margin-bottom: 5px; }
        .nav-link-custom:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .nav-link-custom i { width: 30px; font-size: 1.1rem; }
        .viewport { width: 100vw; height: calc(100vh - 56px); overflow: hidden; position: relative; cursor: grab; background: #eef2f7; }
        .viewport:active { cursor: grabbing; }
        .tree-wrapper { position: absolute; transform-origin: 0 0; padding: 150px; display: inline-block; transition: transform 0.1s ease-out; }
        .tree ul { padding-top: 25px; position: relative; display: flex; justify-content: center; padding-left: 0; }
        .tree li { float: left; text-align: center; list-style-type: none; position: relative; padding: 25px 5px 0 5px; }
        .tree li::before, .tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 2px solid #3498db; width: 50%; height: 25px; }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid #3498db; }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid #3498db; border-radius: 0 5px 0 0; }
        .tree li:first-child::after { border-radius: 5px 0 0 0; }
        .tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid #3498db; width: 0; height: 25px; }
        .person-card { border: 2px solid #d4e6f1; padding: 12px; display: inline-block; border-radius: 15px; background-color: white; min-width: 150px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; position: relative; z-index: 10; transition: 0.3s; }
        .person-card:hover { border-color: var(--secondary); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .person-card .name { font-weight: bold; color: var(--primary); font-size: 0.9rem; }
        .person-card .spouse { font-size: 0.75rem; color: #e74c3c; margin-top: 4px; border-top: 1px dashed #d4e6f1; padding-top: 4px; font-style: italic; }
        .gen-tag { background: var(--secondary); color: white; padding: 1px 8px; border-radius: 10px; font-size: 0.6rem; margin-bottom: 5px; display: inline-block; font-weight: bold; }
        .gen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 30px; }
        .zoom-controls { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 2000; }
        .btn-zoom { width: 50px; height: 50px; border-radius: 50%; background: white; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2); font-size: 1.3rem; color: var(--primary); display: flex; align-items: center; justify-content: center; }
        #custom-menu { position: absolute; display: none; z-index: 4000; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); min-width: 190px; overflow: hidden; border: 1px solid var(--accent); }
        .menu-item { padding: 12px 18px; cursor: pointer; display: flex; align-items: center; font-size: 0.9rem; border: none; width: 100%; background: none; text-align: left; }
        .menu-item:hover { background: #f0f7ff; color: var(--secondary); }
        .menu-item i { width: 28px; color: var(--secondary); }
        .hidden { display: none !important; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .lineage-path-box { background: var(--accent); padding: 10px; border-radius: 10px; color: var(--primary); font-size: 0.85rem; font-weight: 600; text-align: left; margin-bottom: 15px; }
        .sync-status { font-size: 0.7rem; margin-left: 8px; font-weight: normal; }
        .stat-box { background-color: #f8f9fa; padding: 8px; border-radius: 8px; }
        .stat-label { font-size: 0.7rem; color: #6c757d; display: block; margin-bottom: 2px; }
        .stat-value { font-size: 1rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
<!-- KONTEN HTML LENGKAP SAMA SEPERTI SEBELUMNYA -->
<div id="login-page">...</div>
<div id="main-app" class="hidden">...</div>
<!-- SEMUA MODAL -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // --- STATE ---
    let familyData = JSON.parse(localStorage.getItem('nasabData')) || [{ id: "root", name: "Kepala Keluarga", parentId: null, spouse: "", bio: "Pangkal silsilah keluarga.", phone: "", photo: "" }];
    let systemUsers = JSON.parse(localStorage.getItem('nasabUsers')) || [{ username: 'boss', pass: 'boss123', role: 'administrator' }];
    let currentUser = null, selectedNodeId = null, currentBase64 = "", currentAction = null, focusNodeId = null;

    // --- ZOOM & PAN ENGINE ---
    let scale = 0.8, posX = 0, posY = 0;
    const viewport = document.getElementById('viewport'), wrapper = document.getElementById('tree-wrapper');
    let isDragging = false, startX, startY;
    viewport.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY; });
    window.addEventListener('mousemove', e => { if (isDragging) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } });
    window.addEventListener('mouseup', () => isDragging = false);
    viewport.addEventListener('touchstart', e => { if(e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX - posX; startY = e.touches[0].clientY - posY; e.preventDefault();} });
    viewport.addEventListener('touchmove', e => { if(isDragging && e.touches.length === 1) { posX = e.touches[0].clientX - startX; posY = e.touches[0].clientY - startY; updateTransform(); e.preventDefault();} });
    viewport.addEventListener('touchend', () => isDragging = false);
    function changeZoom(d) { scale = Math.min(Math.max(0.3, scale + d), 3); updateTransform(); }
    function resetZoom() { scale = 0.8; posX = (viewport.offsetWidth - wrapper.offsetWidth * scale) / 2; posY = 50; updateTransform(); }
    function updateTransform() { wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

    // --- SECURE CLOUD ENGINE ---
    async function syncWithCloud() {
        document.getElementById('cloud-info').innerText = "(Syncing...)";
        try {
            const res = await fetch('/.netlify/functions/github-proxy');
            if (res.ok) {
                const d = await res.json();
                const content = JSON.parse(atob(d.content));
                if(content.family) familyData = content.family;
                if(content.users) systemUsers = content.users;
                localStorage.setItem('nasabData', JSON.stringify(familyData));
                localStorage.setItem('nasabUsers', JSON.stringify(systemUsers));
                if (currentUser) renderTree();
                document.getElementById('cloud-info').innerText = "(Connected)";
            } else {
                document.getElementById('cloud-info').innerText = `(Error: ${res.status})`;
            }
        } catch (e) {
            console.error("Sync Error:", e);
            document.getElementById('cloud-info').innerText = "(Offline)";
        }
    }

    async function pushToCloud() {
        try {
            const combinedData = { family: familyData, users: systemUsers };
            const response = await fetch('/.netlify/functions/github-proxy', {
                method: 'POST',
                body: JSON.stringify(combinedData, null, 2)
            });
            if (!response.ok) { console.error("Push to cloud failed with status:", response.status); } 
            else { console.log("Push to cloud successful."); }
        } catch (e) { console.error("Push to cloud failed:", e); }
    }

    // --- SISA KODE JAVASCRIPT LENGKAP SAMA SEPERTI SEBELUMNYA ---
    // (login, startApp, renderTree, showDetail, dll)
    // ...
</script>
</body>
</html>
